<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | E-Learn Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <header class="auth-navbar">
    <a href="index.html" class="auth-logo">
      <span class="logo-mark">E</span>
      <span class="logo-text">Learn<span>Pro</span></span>
    </a>
    <nav class="auth-nav-links">
      <a href="index.html">Home</a>
      <a href="signin.html">Sign In</a>
    </nav>
  </header>

  <main class="auth-main">
    <section class="auth-card">
      <h1>Create a new password</h1>
      <p class="auth-subtitle">Choose a strong password to secure your account.</p>
      <form class="auth-form" action="signin.html" method="get">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required />
        </div>
        <div class="form-group">
          <label for="confirmNewPassword">Confirm Password</label>
          <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="Confirm new password" required />
        </div>
        <button type="submit" class="btn btn-primary">Update Password</button>
      </form>
      <p class="auth-footer-text">
        Remembered your password?
        <a href="signin.html">Back to sign in</a>
      </p>
    </section>
  </main>

  <footer class="auth-footer">
    <p>&copy; 2026 E-Learn Pro. All rights reserved.</p>
  </footer>
</body>
</html>
